services:
  # Backend API Server (Express on Render)
  - type: web
    name: openjck-api
    env: node
    region: singapore  # Closest to India
    plan: free
    buildCommand: cd server && npm ci
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: false  # Manual deploys only
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 7070
      - key: SUPABASE_URL
        sync: false  # Must be set manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: LOG_LEVEL
        value: info

  # Frontend Dashboard (Next.js on Vercel)
  # Deploy separately via Vercel integration
  # See DEPLOYMENT.md for instructions